                var html_23e046f09ae2b89ec115694b6c3b1090 = $(`<div id="html_23e046f09ae2b89ec115694b6c3b1090" style="width: 100.0%; height: 100.0%;">     <b>Bisanthe</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Bisanthe (Ancient Greek: Βισάνθη) was a great city in ancient Thrace, on the coast of the Propontis, which had been founded by the Samians.[1][2][3][4] About 400 BCE, Bisanthe belonged to the kingdom of the Thracian prince Seuthes II.[5] At a later period its name was changed into Raedestum, Rhaedestum or Rhaideston (Ῥαίδεστον), or Raedestus, Rhaedestus or Rhaidestos (Ῥαίδεστος); but when this change took place is unknown. In the 6th century CE, the emperor Justinian did much to restore the city, which seems to have fallen into decay;[6] but after that time it was twice destroyed by the Bulgarians, first in 813,[7] and a second time in 1206.[8] The further history of this city, which was of great importance to Byzantium, was covered by Byzantine historians George Pachymeres and Cantacuzenus. It is generally believed that the town of Resistos or Resisto, mentioned by Pliny the Elder,[9] and in the Antonine Itinerary, is the same as Bisanthe; but Pliny mentions Bisanthe and Resistos as distinct towns.[9] Coins minted by Bisanthe survive.[10] Under the name Rhaedestus, it remains a titular see of the Roman Catholic Church.[11] <br><br>     <a href="https://en.wikipedia.org//wiki/Bisanthe" target="_blank">Source</a>     </div>`)[0];

                var html_023ba7438314267549cbb3cab2261f18 = $(`<div id="html_023ba7438314267549cbb3cab2261f18" style="width: 100.0%; height: 100.0%;">     <b>Bubon (Lycia)</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Bubon or Boubon (Ancient Greek: Βούβων) was a city of ancient Lycia noted by Stephanus of Byzantium; the ethnic name, he adds, ought to be Βουβώνιος, but it is Βουβωνεύς, for the Lycians rejoice in this form.[1] The truth of this observation of Stephanus is proved by the inscription found on the spot: Βουβωνέων ἡ Βουλὴ καὶ ὁ Δῆμος. Bubon is placed in the map in Spratt's Lycia, near 37° N. lat. west of Balbura, near a place named Ibecik, which location is confirmed by modern scholars.[2][3] Bubon is mentioned by Pliny, Ptolemy, and Hierocles. Pliny mentions a kind of chalk (creta) that was found about Bubon. [4] The city stood on a hill side. The ruins are not striking. There is a small theatre built of sandstone, and on the summit of the hill was the acropolis. Bubon is in a mountainous tract and it commands the entrance to the pass over the mountains. Bubon, along with Balbura and Oenoanda formed the district Cabalia. [5] <br><br>     <a href="https://en.wikipedia.org//wiki/Bubon_(Lycia)" target="_blank">Source</a>     </div>`)[0];

                var html_05e1f076a552c63532296301f153fe2a = $(`<div id="html_05e1f076a552c63532296301f153fe2a" style="width: 100.0%; height: 100.0%;">     <b>Cabira</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Центральная и южная Анатолия<br><br>     Cabira or Kabeira (/kəˈbaɪrə/; Greek: τὰ Κάβειρα) was a town of ancient Pontus in Asia minor, at the base of the range of Paryadres, about 150 stadia south of Eupatoria or Magnopolis, which was at the junction of the Iris and the Lycus. Eupatoria was in the midst of the plain called Phanaroea, whereas Cabira, as Strabo says was at the base of the Paryadres.[1] Mithridates the Great built a palace at Cabira; and there was a water-mill there (Greek: ὑδραλέτης), and places for keeping wild animals, hunting grounds, and mines. Less than 200 stadia from Cabira was the remarkable rock or fortress called Caenon (Greek: Καινόν [χωρίον]), where Mithridates kept his most valuable things. Cn. Pompeius took the place and its treasures, which, when Strabo wrote, were in the Roman Capitol. In Strabo's time a woman, Pythodoris, the widow of King Polemon, had Cabira with the Zelitis and Magnopolitis. Pompeius made Cabira a city, and gave it the name Diospolis (Διόσπολις). Pythodoris enlarged it, gave it the name Sebaste (Σεβαστή), which is the Greek equivalent to Augusta, and used it as her royal residence. Near Cabira probably at a village named Ameria, there was a temple with a great number of slaves belonging to it, and the high priest enjoyed this benefice.[2] The god Men of Pharnaces (Μήν Φαρνάκου) was worshipped at Cabira. Mithridates was at Cabira during the winter that L. Lucullus was besieging Amisus and Eupatoria.[3] Lucullus afterwards took Cabira.[4] There are some autonomous coins of Cabira with the epigraph "Καβηρων".[5] <br><br>     <a href="https://en.wikipedia.org//wiki/Cabira" target="_blank">Source</a>     </div>`)[0];

                var html_047904da8f17d503e377ef957b5f517e = $(`<div id="html_047904da8f17d503e377ef957b5f517e" style="width: 100.0%; height: 100.0%;">     <b>Cardia (Thrace)</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Cardia or Kardia (Ancient Greek: Kαρδία), anciently the chief town of the Thracian Chersonese (today Gallipoli peninsula), was situated at the head of the Gulf of Melas (today the Gulf of Saros). It was originally a colony of the Milesians and Clazomenians; but subsequently, in the time of Miltiades (late 6th century BC), the place also received Athenian colonists,[1] as proved by Miltiades tyranny (515–493 BC). But this didn't make Cardia necessarily always pro-Athenian: when in 357 BC Athens took control of the Chersonese, the latter, under the rule of a Thracian prince, was the only city to remain neutral; but the decisive year was 352 BC when the city concluded a treaty of amity with king Philip II of Macedonia. A great crisis exploded when Diopeithes, an Athenian mercenary captain, had in 343 BC brought Attic settlers to the town; and since Cardia was unwilling to receive them, Philip immediately sent help to the town. The king proposed to settle the dispute between the two cities by arbitration, but Athens refused.[2]  Demosthenes, the famous Greek patriot and orator, spoke on this very matter to the Athenian Senate in 341 BC his "Oration On The State Of The Chersonesus":[3] <br><br>     <a href="https://en.wikipedia.org//wiki/Cardia_(Thrace)" target="_blank">Source</a>     </div>`)[0];

                var html_ec62916116ee9af4cc8d00751abe70f4 = $(`<div id="html_ec62916116ee9af4cc8d00751abe70f4" style="width: 100.0%; height: 100.0%;">     <b>Carussa</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Центральная и южная Анатолия<br><br>     Carussa or Karoussa (Ancient Greek: Κάρουσσα), also spelt as Carusa or Karousa (Καροῦσα), also known as Polichnion,[1] was a Greek trading place (emporium) on the Black Sea coast of ancient Paphlagonia, south of Sinope, and 150 stadia from it.[2][3] It is also mentioned in the Periplus of Pseudo-Scylax as a Greek city; and by Pliny the Elder.[4] It was a member of the Delian League as it appears in tribute lists of ancient Athens.[5] <br><br>     <a href="https://en.wikipedia.org//wiki/Carussa" target="_blank">Source</a>     </div>`)[0];

                var html_7576d1096e5d10013d5b4790ebf62c69 = $(`<div id="html_7576d1096e5d10013d5b4790ebf62c69" style="width: 100.0%; height: 100.0%;">     <b>Caryanda</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Caryanda[pronunciation?] or Karyanda (Ancient Greek: Καρυάνδα) was a city on the coast of ancient Caria in southwestern Anatolia.  Stephanus of Byzantium describes it as a city and harbour (λίμην) near Myndus and Cos.[1] But λιμήν, in the text of Stephanus, is an emendation or alteration: the manuscripts have λίμνη ('lake'). Strabo places Caryanda between Myndus and Bargylia, and he describes it, according to the common text, as "a lake, and island of the same name with it;" and thus the texts of Stephanus, who has got his information from Strabo, agree with the texts of Strabo.[2] Pliny simply mentions the island Caryanda with a town; but he is in that passage only enumerating islands.[3] In another passage he mentions Caryanda as a place on the mainland,[4] and Pomponius Mela does also.[5] Scylax of Caryanda, one of the most famous mariners and explorers of ancient times, was a native of Caryanda. He lived in the late 6th and early 5th centuries BCE and served the Persian king Darius I.[6] <br><br>     <a href="https://en.wikipedia.org//wiki/Caryanda" target="_blank">Source</a>     </div>`)[0];

                var html_461b2f37bede7f3f9432c072e52a388d = $(`<div id="html_461b2f37bede7f3f9432c072e52a388d" style="width: 100.0%; height: 100.0%;">     <b>Cibyra Mikra</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Центральная и южная Анатолия<br><br>     Cibyra (Greek: Κιβύρα) also referred to as Cibyra Mikra to distinguish it from Cibyra Magna, was a town in ancient Pamphylia. Strabo, after mentioning Side, says, "...and near it is the coast of the little Cibyratae, and then the river Melas, and a station for ships".[1] The site of Side is well known. The Melas is the Manavgat River, 4 miles (6.4 km) east of Side. But there could have been no city between Side and the Melas, and it is conjectured that in Strabo's text, the coast ("Paralia") of the Cibyratae should come after the Melas. The vestiges of Cibyra are probably those observed by Captain Beaufort upon a height which rises from the right bank of a considerable river about 8 miles (13 km) to the eastward of the Melas, about 4 miles (6.4 km) to the west of Cape Karáburun, and nearly 2 miles (3.2 km) from the shore.[2] Ptolemy mentions this Cibyra among the inland towns of Cilicia Trachea; but Scylax places it on the coast. There is a place, Cyberna (Κυβέρνη), mentioned in the Stadiasmus, which is placed 59 stadia east of the Melas. If the conjecture as to Strabo's text is correct, we may identify Cyberna with this Cibyra of Pamphylia. <br><br>     <a href="https://en.wikipedia.org//wiki/Cibyra_Mikra" target="_blank">Source</a>     </div>`)[0];

                var html_c8ebbb994c6d94c262f9fef82aa565a0 = $(`<div id="html_c8ebbb994c6d94c262f9fef82aa565a0" style="width: 100.0%; height: 100.0%;">     <b>Kemalpaşa</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Kemalpaşa is a large town and the center of the district of the same name in İzmir Province, Turkey. Its district area extends immediately to the east of İzmir's easternmost  metropolitan district, Bornova, and Kemalpaşa town being at a distance of only 29 km (18 mi) from the historical and traditional center of İzmir, (Konak), it pulsates along with the rhythm of the big city, with corresponding high levels of development in terms of industry and services. İzmir-Ankara highway crosses the district area 8 km (5.0 mi) to the north of the district center. Kemalpaşa district area borders on the administrative divisions of Manisa center in the north, Manisa's depending district of Turgutlu in the east and İzmir's depending districts of Torbalı and Bayındır in the south. The eastern and southern parts of Kemalpaşa district preserve their markedly rural characteristics, which results in an urbanization rate of only 25.7 for the district area as a whole, despite the presence of a strong industrial base in and to the west of Kemalpaşa town. Kemalpaşa's very large organized industrial zone (KOSBİ) brings together producers of construction materials, rubber and plastic goods, textiles and clothing, leather, paper, packaging materials, machinery and other equipment, including electrical tools and installations, dyes and other chemical substances, marble and car parts, as well as foundries and other metalworks.  Agriculture also occupies a portion with high added value in Kemalpaşa's economy, its cherries being of nationwide renown (known as Kemalpaşa kirazı in Turkish) and exported. Literacy is at a high level at 90%, and the neighboring Bornova, where Ege University is based, serves as a nearby pool in terms of trained personnel. <br><br>     <a href="https://en.wikipedia.org//wiki/Kemalpa%C5%9Fa" target="_blank">Source</a>     </div>`)[0];

                var html_684ea7330d5abe96cd6b13b0babcf8f1 = $(`<div id="html_684ea7330d5abe96cd6b13b0babcf8f1" style="width: 100.0%; height: 100.0%;">     <b>Knidos</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Knidos or Cnidus[1][2] (/ˈnaɪdəs/; Greek: Κνίδος, Ancient: [knídos], Modern: [ˈkniðos]) was a Greek city of ancient Caria and part of the Dorian Hexapolis, in south-western Asia Minor, modern-day Turkey. It was situated on the Datça peninsula, which forms the southern side of the Sinus Ceramicus, now known as Gulf of Gökova. By the 4th century BC, Knidos was located at the site of modern Tekir, opposite Triopion Island. But earlier, it was probably at the site of modern Datça (at the half-way point of the peninsula).[3] <br><br>     <a href="https://en.wikipedia.org//wiki/Knidos" target="_blank">Source</a>     </div>`)[0];

                var html_2c99acad71c95c9a4d0e7572227a4d27 = $(`<div id="html_2c99acad71c95c9a4d0e7572227a4d27" style="width: 100.0%; height: 100.0%;">     <b>Labraunda</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Labraunda (Ancient Greek: Λάβρανδα Labranda or Λάβραυνδα Labraunda) is an ancient archaeological site five kilometers west of Ortaköy, Muğla Province, Turkey, in the mountains near the coast of Caria. In ancient times, it was held sacred by Carians and Mysians alike. The site amid its sacred plane trees [1] was enriched in the Hellenistic style by the Hecatomnid dynasty of Mausolus, satrap (and virtual king) of Persian Caria (c. 377 – 352 BCE), and also later by his successor and brother Idrieus; Labranda was the dynasty's ancestral sacred shrine. The prosperity of a rapidly hellenised Caria occurred in the during the 4th century BCE.[2] Remains of Hellenistic houses and streets can still be traced, and there are numerous inscriptions. The cult icon here was a local Zeus Labrandeus (Ζεὺς Λαβρανδεύς), a standing Zeus with the tall lotus-tipped scepter upright in his left hand and the double-headed axe, the labrys, over his right shoulder. The cult statue was the gift of the founder of the dynasty, Hecatomnus himself, recorded in a surviving inscription.[3] <br><br>     <a href="https://en.wikipedia.org//wiki/Labraunda" target="_blank">Source</a>     </div>`)[0];

                var html_dda0c2f1a3e3d4a74d7bef4ff505b922 = $(`<div id="html_dda0c2f1a3e3d4a74d7bef4ff505b922" style="width: 100.0%; height: 100.0%;">     <b>Leucae (Ionia)</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Leucae (Greek: Λεῦκαι) or Leuce (Greek: Λεύκη) was a small town of ancient Ionia, in the neighbourhood of Phocaea. Leucae was situated, according to Pliny in promontorio quod insula fuit, or, "on an island promontory."[1] From Scylax we learn that it was a place with harbours. According to Diodorus, the Persian admiral Tachos founded this town on an eminence on the sea coast, in 352 BCE; but shortly after, when Tachos had died, the Clazomenians and Cymaeans quarrelled about its possession, and the former succeeded by a stratagem in making themselves masters of it.[2] At a later time Leucae became remarkable for the battle fought in its neighbourhood between the consul Publius Licinius Crassus Dives Mucianus and Aristonicus in 131 BCE.[3] Some have supposed this place to be identical with the Leuconium mentioned by Thucydides;[4] but this is impossible, as this latter place must be looked for in Chios. The site of the ancient Leucae is at Üçtepeler, Izmir Province, Turkey, some distance from the coast.[5]  Coins were minted at Leucae in the 3rd century BCE.[5] <br><br>     <a href="https://en.wikipedia.org//wiki/Leucae_(Ionia)" target="_blank">Source</a>     </div>`)[0];

                var html_1922e6f1f21964039f9311c2b9510cad = $(`<div id="html_1922e6f1f21964039f9311c2b9510cad" style="width: 100.0%; height: 100.0%;">     <b>Olympus (Lycia)</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Центральная и южная Анатолия<br><br>     Olympus or Olympos (Ancient Greek: Ὄλυμπος, Ólympos; Latin: Olympus) was a city in ancient Lycia. It was situated in a river valley near the coast. Its ruins are located south of the modern town Çıralı in the Kumluca district of Antalya Province, southwestern Turkey. Together with the sites of the ancient cities Phaselis and Idyros it is part of the Olympos Beydaglari National Park. The perpetual gas fires at Yanartaş are found a few kilometers to the northwest of the site. <br><br>     <a href="https://en.wikipedia.org//wiki/Olympus_(Lycia)" target="_blank">Source</a>     </div>`)[0];

                var html_e9ba4b08b083afea2b8ce68761c8a0ee = $(`<div id="html_e9ba4b08b083afea2b8ce68761c8a0ee" style="width: 100.0%; height: 100.0%;">     <b>Pactya</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Pactya or Paktye (Ancient Greek: Πακτύη) was an ancient Greek[1] city located in ancient Thrace, on the Thracian Chersonesus. It is cited in the Periplus of Pseudo-Scylax, in its recitation of the towns of the Thracian Chersonesus, along with Aegospotami, Cressa, Crithote and then Pactya, situated 36 stadia from Cardia.[2][3][4] It is said that Miltiades founded it.[5] Strabo places it on the Propontis between Crithote and Macron Teichos.[6] According to Herodotus, Miltiades the Elder ordered a wall built between Cardia, which was on the coast of Gulf of Melas and Pactya, which was on the Propontis side, to prevent invasion of the Chersonesus by the Apsinthii.[7] Alcibiades retired here the Athenians had for the second time deprived him of the command.[8] It was a member of the Delian League.[9] Pliny the Elder points out that both Cardia and Pactya later joined to form Lysimachia.[10] <br><br>     <a href="https://en.wikipedia.org//wiki/Pactya" target="_blank">Source</a>     </div>`)[0];

                var html_5a5737507fb2209af27e76da45ba977d = $(`<div id="html_5a5737507fb2209af27e76da45ba977d" style="width: 100.0%; height: 100.0%;">     <b>Padyandus</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Центральная и южная Анатолия<br><br>     Padyandus or Podyandos (Ancient Greek: Παδυανδός), also Paduandus, Podandos or Podandus (Πόδανδος), and appearing corrupted in ancient sources as Opodanda, Opodandum, and Rhegepodandos (Ῥεγεποδανδός) was an ancient town in Cataonia, the southernmost part of Cappadocia, in what is today Turkey. The town was located about 40 km to the southeast of Faustinopolis, near the pass of Mount Taurus known by the name of the Cilician Gates (Ptol. v. 7. § 7.). Extended by the emperor Valens (364-378), the town is mentioned in the itineraria, but its name assumes different forms; as Paduandus (Tab. Peut.), Podandos (It. Ant. p. 145), Mansio Opodanda (It. Hieros. p. 578), and Rhegepodandos (Hierocl. p 699). The place is described by Basilius (Epist. 74) as one of the most wretched holes on earth. It is said to have derived its name from a small stream in the neighborhood. (Const. Porphyr. Vit. Basil. 36; comp. Cedren. p. 575; Jo. Scylitz. Hist. pp. 829, 844.)  Due to similarity of name, tradition assigns the location of Padyandus to that of Pozantı, a position that modern scholars only tentatively accept.[1] <br><br>     <a href="https://en.wikipedia.org//wiki/Padyandus" target="_blank">Source</a>     </div>`)[0];

                var html_11d7fc4b8bfeb57d8870b58b16e1def1 = $(`<div id="html_11d7fc4b8bfeb57d8870b58b16e1def1" style="width: 100.0%; height: 100.0%;">     <b>Pamphylia</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Центральная и южная Анатолия<br><br>     Pamphylia (Ancient Greek: Παμφυλία, Pamphylía, modern pronunciation Pamfylía /pæmˈfɪliə/) was a region in the south of Asia Minor, between Lycia and Cilicia, extending from the Mediterranean to Mount Taurus (all in modern-day Antalya province, Turkey). It was bounded on the north by Pisidia and was therefore a country of small extent, having a coast-line of only about 120 km (75 miles) with a breadth of about 50 km (30 miles). Under the Roman administration the term Pamphylia was extended so as to include Pisidia and the whole tract up to the frontiers of Phrygia and Lycaonia, and in this wider sense it is employed by Ptolemy.[1]  <br><br>     <a href="https://en.wikipedia.org//wiki/Pamphylia" target="_blank">Source</a>     </div>`)[0];

                var html_539bf8dbd6788593cd524621338974ec = $(`<div id="html_539bf8dbd6788593cd524621338974ec" style="width: 100.0%; height: 100.0%;">     <b>Percote</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Percote or Perkote (Ancient Greek: Περκώτη) was a town or city of ancient Mysia on the southern (Asian) side of the Hellespont, to the northeast of Troy. Percote is mentioned a few times in Greek mythology, where it plays a very minor role each time.  It was said to be the home of a notable seer named Merops, also its ruler.  Merops was the father of Arisbe (the first wife of King Priam, and subsequently wife of King Hyrtacus), Cleite (wife of King Cyzicus), and two sons named Amphius and Adrastus who fought during the Trojan War. As an ally of Troy, Percote sent a contingent to help King Priam during the Trojan War - though this contingent was led not by Merops's sons, but by Asius, son of Hyrtacus, according to Homer's Iliad, one native from Percote was wounded in the Trojan War by Antilochus, two natives from Percote were killed in the Trojan War by Diomedes and Ullysses.[1][2]  The Meropidae (Amphius and Adrastus) instead lead a contingent from nearby Adrastea.  A nephew of Priam, named Melanippus, son of Hicetaon, herded cattle (oxen) at Percote, according to Homer. <br><br>     <a href="https://en.wikipedia.org//wiki/Percote" target="_blank">Source</a>     </div>`)[0];

                var html_b875fb02c1205cd39562d88fbdf8acf7 = $(`<div id="html_b875fb02c1205cd39562d88fbdf8acf7" style="width: 100.0%; height: 100.0%;">     <b>Priene</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Priene (Ancient Greek: Πριήνη, romanized: Priēnē; Turkish: Prien) was an ancient Greek city of Ionia (and member of the Ionian League) located at the base of an escarpment of Mycale, about 6 kilometres (3.7 mi) north of what was then the course of the Maeander River (now called the Büyük Menderes or "Big Maeander"). It was 67 kilometres (42 mi) from ancient Anthea, 15 kilometres (9.3 mi) from ancient Aneon and 25 kilometres (16 mi) from ancient Miletus. The city was built on the sea coast, overlooking the former Latmian Gulf of the Aegean. It was developed on steep slopes and terraces extending from sea level to a height of 380 metres (1,250 ft) above sea level at the top of the escarpment.[1] Because of siltation from the river filling the bay over several centuries, the city is now an inland site. It is located at a short distance west of the modern village Güllübahçe Turun in the Söke district of Aydın Province, Turkey. <br><br>     <a href="https://en.wikipedia.org//wiki/Priene" target="_blank">Source</a>     </div>`)[0];

                var html_22a0747bee621f286555ed69e3611724 = $(`<div id="html_22a0747bee621f286555ed69e3611724" style="width: 100.0%; height: 100.0%;">     <b>Sardis</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Sardis (/ˈsɑːrdɪs/) or Sardes (/ˈsɑːrdiːz/; Lydian: Sfard; Ancient Greek: Σάρδεις Sardeis; Old Persian: Sparda; Biblical Hebrew: ספרד‎ Sfarad) was an ancient city at the location of modern Sart (Sartmahmut before 19 October 2005), near Salihli, in Turkey's Manisa Province. Sardis was the capital of the ancient kingdom of Lydia,[1] one of the important cities of the Persian Empire, the seat of a Seleucid Satrap, the seat of a proconsul under the Roman Empire, and the metropolis of the province Lydia in later Roman and Byzantine times. As one of the seven churches of Asia, it was addressed by the author of the Book of Revelation in the New Testament,[2] in terms which seem to imply that its church members did not finish what they started, that they were about image and not substance.[3] Its importance was due first to its military strength, secondly to its situation on an important highway leading from the interior to the Aegean coast, and thirdly to its commanding the wide and fertile plain of the Hermus. <br><br>     <a href="https://en.wikipedia.org//wiki/Sardis" target="_blank">Source</a>     </div>`)[0];

                var html_85993d93d33a8bfdb586187885ed0c1e = $(`<div id="html_85993d93d33a8bfdb586187885ed0c1e" style="width: 100.0%; height: 100.0%;">     <b>Sigeion</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Западная Турция (Эгейско-Мраморская зона)<br><br>     Sigeion[pronunciation?] (Ancient Greek: Σίγειον, Sigeion; Latin: Sigeum) was an ancient Greek city in the north-west of the Troad region of Anatolia located at the mouth of the Scamander (the modern Karamenderes River).[1] Sigeion commanded a ridge between the Aegean Sea and the Scamander which is now known as Yenişehir and is a part of the Çanakkale district in Çanakkale province, Turkey.[2] The surrounding region was referred to as the Sigean Promonotory, which was frequently used as a point of reference by ancient geographers since it marked the mouth of the Hellespont.[3] The outline of this promontory is no longer visible due to the alluvial activity of the Karamenderes which has filled in the embayment east of Yenişehir.[4] The name 'Sigeion' means 'silent place' and is derived from Ancient Greek σιγή (sigē), 'silence'; in Classical Antiquity, the name was assumed to be antiphrastic, i.e. indicating a characteristic of the place contrary to reality, since the seas in this region are known for their fierce storms.[5] <br><br>     <a href="https://en.wikipedia.org//wiki/Sigeion" target="_blank">Source</a>     </div>`)[0];

                var html_93d68fc25c71d0e418345eb77bcfd8ff = $(`<div id="html_93d68fc25c71d0e418345eb77bcfd8ff" style="width: 100.0%; height: 100.0%;">     <b>Trabzon</b><br>     <b>Type:</b> Greek<br>     <b>Region:</b> Восточная и северо-восточная Анатолия<br><br>     Trabzon (Turkish pronunciation: [ˈtɾabzon]; Ophitic Pontic Greek: Τραπεζούντα, (Trapezounta), Armenian: Տրապիզոն, romanized: Trapizon), historically known as Trebizond in English, is a city on the Black Sea coast of northeastern Turkey and the capital of Trabzon Province. Trabzon, located on the historical Silk Road, became a melting pot of religions, languages and culture for centuries and a trade gateway to Persia in the southeast and the Caucasus to the northeast.[3] The Venetian and Genoese merchants paid visits to Trabzon during the medieval period and sold silk, linen and woolen fabric. Both republics had merchant colonies within the city – Leonkastron and the former "Venetian castle" – that played a role to Trabzon similar to the one Galata played to Constantinople (modern Istanbul).[4] Trabzon formed the basis of several states in its long history and was the capital city of the Empire of Trebizond between 1204 and 1461. During the early modern period, Trabzon, because of the importance of its port, again became a focal point of trade to Persia and the Caucasus. <br><br>     <a href="https://en.wikipedia.org//wiki/Trabzon" target="_blank">Source</a>     </div>`)[0];

                var html_47826ec52064721619aab024bbc9be3c = $(`<div id="html_47826ec52064721619aab024bbc9be3c" style="width: 100.0%; height: 100.0%;">     <b>Claudiopolis (Cilicia)</b><br>     <b>Type:</b> Greek/Roman<br>     <b>Region:</b> Центральная и южная Анатолия<br><br>     Claudiopolis (Ancient Greek: Κλαυδιόπολις) also called Ninica and Ninica Claudiopolis,[1] was an ancient city of Cilicia.  Ammianus[2] mentions Seleucia and Claudiopolis as cities of Cilicia, or of the country drained by the Calycadnus; and Claudiopolis was a colony of Claudius Caesar. It is described by Theophanes of Byzantium as situated in a plain between the two Taurus Mountains, a description which exactly, corresponds to the position of the basin of the Calycadnus. Claudiopolis may therefore be represented by Mut, which is higher up the valley than Seleucia, and near the junction of the northern and western branches of the Calycadnus. It is also the place to which the pass over the northern Taurus leads from Laranda.[3] Pliny mentions a Claudiopolis of Cappadocia,[4] and Ptolemy has a Claudiopolis in Cataonia.[5] Both these passages and those of Ammianus and Theophanes are cited to prove that there is a Claudiopolis in Cataonia, though it is manifest that the passage in Ammianus at least can only apply to a town in the valley of the Calycadnus in Cilicia Trachea. The two Tauri of Theophanes might mean the Taurus and Antitaurus. But Hierocles places Claudiopolis in Isauria, a description which cannot apply to the places so named of Pliny and Ptolemy. The city apparently received the Roman colony name Colonia Iulia Felix Augusta Ninica, and minted coins in antiquity.[6] <br><br>     <a href="https://en.wikipedia.org//wiki/Claudiopolis_(Cilicia)" target="_blank">Source</a>     </div>`)[0];
